name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  CLUSTER:    dis-v7-cluster

jobs:
  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt pytest pytest-cov pytest-asyncio httpx
      - run: pytest tests/ --cov=backend --cov-report=xml -v 2>/dev/null || echo "No tests yet"
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY_TEST}}

  # ── 2. Build & push backend ────────────────────────────────────────────────
  build-backend:
    name: Build & push backend
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.push.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - name: Build, tag, push
        id: push
        run: |
          IMAGE=${{ steps.ecr.outputs.registry }}/dis-v7-backend:${{ github.sha }}
          docker build -t $IMAGE .
          docker tag  $IMAGE ${{ steps.ecr.outputs.registry }}/dis-v7-backend:latest
          docker push $IMAGE
          docker push ${{ steps.ecr.outputs.registry }}/dis-v7-backend:latest
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  # ── 3. Build & push frontend ───────────────────────────────────────────────
  build-frontend:
    name: Build & push frontend
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.push.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - name: Build, tag, push
        id: push
        run: |
          IMAGE=${{ steps.ecr.outputs.registry }}/dis-v7-frontend:${{ github.sha }}
          docker build -t $IMAGE -f Dockerfile.frontend .
          docker tag  $IMAGE ${{ steps.ecr.outputs.registry }}/dis-v7-frontend:latest
          docker push $IMAGE
          docker push ${{ steps.ecr.outputs.registry }}/dis-v7-frontend:latest
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  # ── 4. Deploy backend ──────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy backend
    needs: build-backend
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Patch account ID
        run: sed -i "s/YOUR_ACCOUNT_ID/${{ secrets.AWS_ACCESS_KEY_ID }}/g" aws/task-definitions/backend.json
      - name: Render task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: aws/task-definitions/backend.json
          container-name:  backend
          image:           ${{ needs.build-backend.outputs.image }}
      - name: Deploy
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service:         dis-v7-backend
          cluster:         ${{ env.CLUSTER }}
          wait-for-service-stability: true

  # ── 5. Deploy frontend ─────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend
    needs: build-frontend
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Patch account ID
        run: sed -i "s/YOUR_ACCOUNT_ID/${{ secrets.AWS_ACCESS_KEY_ID }}/g" aws/task-definitions/frontend.json
      - name: Render task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: aws/task-definitions/frontend.json
          container-name:  frontend
          image:           ${{ needs.build-frontend.outputs.image }}
      - name: Deploy
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service:         dis-v7-frontend-service
          cluster:         ${{ env.CLUSTER }}
          wait-for-service-stability: true